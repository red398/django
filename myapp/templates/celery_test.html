<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>输入名字</title>
</head>
<body>
    <h3>请输入你的名字</h3>
    <!-- 提交表单，使用 POST 方式 -->
    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="在这里输入名字">
        <button type="submit">提交</button>
    </form>
</body>
</html>
