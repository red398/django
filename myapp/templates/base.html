<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}默认标题{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        /* 导航栏样式 */
        nav {
            background-color: #2c3e50;
            padding: 1rem 2rem;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            margin-right: 2rem;
        }
        nav a:hover {
            color: #3498db;
        }
        /* 主体内容区域 */
        .container {
            width: 80%;
            margin: 30px auto;
            padding: 20px;
        }
        /* 底部样式 */
        footer {
            text-align: center;
            padding: 1.5rem;
            background-color: #f5f5f5;
            color: #666;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <a href="/">首页</a>
        <a href="/login/">登录</a>
        <a href="#">个人中心</a>
        <a href="#">关于我们</a>
    </nav>

    <!-- 主体内容区块，子页面填充 -->
    <div class="container">
        {% block content %}
            <p>默认内容</p>
        {% endblock %}
    </div>

    <!-- 底部 -->
    <footer>
        © 2026 测试网站  小一专用
    </footer>
{% block script %}{% endblock %}
</body>
</html>
