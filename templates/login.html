<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>账号密码登录</title>
</head>
<body>
<h2>账号密码登录</h2>
{% if msg %}
<p style="color:red">{{msg}}</p>
{% endif %}
<form method="post">
  {% csrf_token %}
  <p>用户名:<input type="text" name="username" required></p>
  <p>密码:<input type="password" name="password" required></p>
  <button type="submit">登录</button>
</form>
<p><a href="{% url 'home' %}">返回首页</a></p>
</body>
</html>
